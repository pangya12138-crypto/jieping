name: Build Portable ComicPDF EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller playwright pillow

      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name ComicPDF `
            --collect-all playwright `
            --collect-all PIL `
            comic_pdf_gui.py

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          Copy-Item dist\ComicPDF.exe portable\ComicPDF.exe
          Compress-Archive -Path portable\* -DestinationPath ComicPDF-portable.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicPDF-portable
          path: ComicPDF-portable.zip
          retention-days: 7
