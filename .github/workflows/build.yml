name: Build Portable ComicPDF EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller playwright pillow

      - name: Install bundled Chromium
        shell: pwsh
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "$pwd\pw-browsers"
          python -m playwright install chromium

      - name: Build EXE
        shell: pwsh
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "$pwd\pw-browsers"
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name ComicPDF `
            --collect-all playwright `
            --collect-all PIL `
            --add-data "pw-browsers;pw-browsers" `
            comic_pdf_gui.py

      - name: Create portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          Copy-Item dist\ComicPDF.exe portable\ComicPDF.exe
          @"
          ComicPDF portable edition

          1. Run ComicPDF.exe
          2. Enter the reader URL
          3. Log in manually
          4. Open the first comic page
          5. Click the start button

          No Python installation is required.
          "@ | Set-Content -Encoding UTF8 portable\README.txt
          Compress-Archive -Path portable\* -DestinationPath ComicPDF-portable.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComicPDF-portable
          path: ComicPDF-portable.zip
          retention-days: 7
